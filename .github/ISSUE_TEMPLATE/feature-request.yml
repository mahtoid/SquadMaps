name: Feature Request
description: Have an idea to improve SquadMaps? Request it here.
labels: ["Feature Request", "Status: Needs Triage"]

body:
  - type: markdown
    attributes:
      value: |
        **Guidelines**

        - Search [existing issues](https://github.com/mahtoid/SquadMaps/issues?q=is%3Aissue) first.
        - One feature per issue.
        - Explain how it helps Squad players — that makes prioritisation easier.

  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Maps and layers
        - Mortar calculator
        - Strategy / tactical sidebars
        - Team intel
        - Live servers
        - Sonar/Heatmaps
        - Translations
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: Clear and thorough description of what you want.
    validations:
      required: true

  - type: textarea
    id: player-value
    attributes:
      label: Why would this help Squad players?
      placeholder: e.g. "Players could plan mortar targets faster during prep phase..."
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, or related layers/maps.
    validations:
      required: false
